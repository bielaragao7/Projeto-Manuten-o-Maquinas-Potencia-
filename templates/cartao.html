<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gabriel Aragão</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            padding:20px;
        }

        .card{
            width:100%;
            max-width:420px;
            background:white;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 15px 40px rgba(0,0,0,0.25);
        }

        .banner img{
            width:100%;
            display:block;
        }

        .content{
            padding:30px;
            text-align:center;
        }

        .foto{
            width:130px;
            height:130px;
            border-radius:50%;
            object-fit:cover;
            margin-top:-95px;
            border:6px solid white;
            background:white;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
        }

        h1{
            margin-top:18px;
            font-size:30px;
            color:#0f172a;
        }

        .cargo{
            color:#2563eb;
            font-weight:bold;
            margin-top:8px;
            margin-bottom:30px;
            font-size:18px;
        }

        .btn{
            display:block;
            text-decoration:none;
            margin:12px 0;
            padding:15px;
            border-radius:14px;
            color:white;
            font-weight:bold;
            font-size:17px;
            transition:0.2s;
        }

        .btn:hover{
            transform:scale(1.02);
        }

        .whatsapp{
            background:#25D366;
        }

        .email{
            background:#2563eb;
        }

        .site{
            background:#111827;
        }

        .footer{
            margin-top:25px;
            color:#64748b;
            font-size:14px;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="banner">
        <img src="{{ url_for('static', filename='cartao.png') }}">
    </div>

    <div class="content">

        <img
            class="foto"
            src="{{ url_for('static', filename='gabriel.jpg') }}"
        >

        <h1>Gabriel Aragão</h1>

        <div class="cargo">
            Consultor Comercial
        </div>

        <a
            class="btn whatsapp"
            href="https://wa.me/5511999999999"
            target="_blank"
        >
            WhatsApp
        </a>

        <a
            class="btn email"
            href="mailto:seuemail@gmail.com"
        >
            Email
        </a>

        <a
            class="btn site"
            href="/"
        >
            Abrir Sistema
        </a>

        <div class="footer">
            Cartão Digital
        </div>

    </div>

</div>

</body>
</html>
